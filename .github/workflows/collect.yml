name: Collect comparables (Metz)

# Trigger manuel + hebdomadaire (lundi 04:00 UTC = 05:00 Paris hiver / 06:00 été).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect and push comparables
        working-directory: backend
        env:
          BACKEND_URL: https://backend-frosty-sound-441-docker.fly.dev
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: python -m jobs.push_comparables
