name: Deploy backend (Fly)

# Deploiement auto Fly :
# - push sur `main`    touchant backend/ => app PROD (fly.toml)
# - push sur `staging` touchant backend/ => app STAGING (fly.staging.toml)
# Necessite le secret repo FLY_API_TOKEN avec acces aux DEUX apps (jeton
# org-scoped, ou deux jetons fusionnes). Cote prod : l'app existante. Cote
# staging : `coherence-staging` (doit etre creee avant le premier deploy, cf.
# backend/fly.staging.toml).
on:
  push:
    branches: [main, staging]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

# Un seul deploiement a la fois PAR ENVIRONNEMENT (un deploy staging n'annule
# pas un deploy prod et inversement).
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        working-directory: backend
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/staging" ]; then
            echo "Deploiement STAGING (coherence-staging)"
            flyctl deploy --remote-only --config fly.staging.toml
          else
            echo "Deploiement PROD"
            flyctl deploy --remote-only
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
