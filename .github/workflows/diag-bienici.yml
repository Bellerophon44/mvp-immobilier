name: Diagnose Bien'ici scraper

# Manuel uniquement pour l'instant. On ajoutera 'schedule' une fois validé.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bien'ici diagnostic
        working-directory: backend
        run: python -m scrapers.diag_bienici
