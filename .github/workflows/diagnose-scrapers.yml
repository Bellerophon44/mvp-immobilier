name: Diagnose scrapers

# Boucle de dev automatisable : un push sur une PR touchant les scrapers
# relance le diagnostic et reposte son resume en commentaire de PR. Pas de
# workflow_dispatch a declencher a la main, pas de logs bruts a eplucher.
on:
  pull_request:
    paths:
      - "backend/scrapers/**"
      - "backend/jobs/**"
      - ".github/workflows/diagnose-scrapers.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper diagnostics
        id: diag
        working-directory: backend
        run: python -m scrapers.diagnose --out diag_report.md
        continue-on-error: true

      - name: Recon candidate agencies
        working-directory: backend
        run: python -m scrapers.diagnose --recon-all --out recon_report.md
        continue-on-error: true

      - name: Post diagnostic report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- diagnose-scrapers -->';
            const read = (p) => { try { return fs.readFileSync(p, 'utf8'); } catch (e) { return ''; } };
            const diag = read('backend/diag_report.md') || '_(diagnostic indisponible)_';
            const recon = read('backend/recon_report.md');
            const report = recon ? `${diag}\n\n---\n\n${recon}` : diag;
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail job if any scraper returned zero listings
        if: steps.diag.outcome == 'failure'
        run: |
          echo "Au moins une source a echoue (0 annonce ou exception). Voir le commentaire de PR."
          exit 1
