name: Evals (qualite analyse, vrais appels LLM)

# Filet anti-regression des corrections de prompt (docs/specs/evals-harness-SPEC.md).
# Rejoue les cas de backend/evals/ avec de VRAIS appels OpenAI sur toute PR
# touchant le prompt ou le pipeline d'analyse. Paths cibles (jamais l'ensemble
# du backend : budget) ; declencheur pull_request uniquement, jamais sa
# variante "target" (exfiltration de secret).
on:
  pull_request:
    paths:
      - "backend/app/llm_semantic.py"
      - "backend/app/analysis.py"
      - "backend/app/market_stats.py"
      - "backend/app/scoring.py"
      - "backend/evals/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Garde du secret AVANT pytest : echec explicite, jamais de faux vert.
      # On ne logge que la presence/absence du secret, jamais sa valeur.
      - name: Verifier le secret OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Secret OPENAI_API_KEY absent : creer la cle CI dediee avec usage limit, cf. docs/specs/evals-harness-SPEC.md section 3.1"
            exit 1
          fi
          echo "Secret OPENAI_API_KEY present."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # -rxX rend les XFAIL/XPASS nominatifs dans le rapport : c'est la preuve
      # de reproduction exigee avant merge d'un nouveau cas (spec section 5.4).
      - name: Run evals
        id: evals
        working-directory: backend
        continue-on-error: true
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -o pipefail
          python -m pytest evals -q -rxX --tb=short 2>&1 | tee eval_report.txt

      - name: Post eval report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- evals -->';
            const read = (p) => { try { return fs.readFileSync(p, 'utf8'); } catch (e) { return ''; } };
            let report = read('backend/eval_report.txt') || '_(rapport indisponible)_';
            // Tronque par la fin (le resume pytest, dont les XFAIL/XPASS, est en queue).
            const limit = 60000;
            if (report.length > limit) {
              report = report.slice(-limit);
            }
            const body = `${marker}\nRapport evals (vrais appels LLM, statuts XFAIL/XPASS via -rxX) :\n\n\`\`\`\n${report}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Statut bloquant : les assertions de sanity cassees mettent la PR au
      # rouge ; les regressions connues (xfail) ne font pas echouer le job.
      - name: Fail job if evals failed
        if: steps.evals.outcome == 'failure'
        run: |
          echo "La suite evals a echoue (assertions bloquantes). Voir le commentaire de PR."
          exit 1
