name: Sync labels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/labels.json"
      - ".github/workflows/sync-labels.yml"

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const wanted = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"));
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const byName = new Map(existing.map((l) => [l.name, l]));
            for (const label of wanted) {
              const current = byName.get(label.name);
              if (!current) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                core.info(`created: ${label.name}`);
              } else if (
                current.color.toUpperCase() !== label.color.toUpperCase() ||
                (current.description || "") !== (label.description || "")
              ) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  ...label,
                });
                core.info(`updated: ${label.name}`);
              } else {
                core.info(`ok: ${label.name}`);
              }
            }
