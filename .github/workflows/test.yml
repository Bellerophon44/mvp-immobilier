name: Backend tests

# Harnais de regression de l'atelier : pytest sur chaque PR touchant le backend.
# Encode la memoire "ne plus reproduire" sous forme executable (cf .claude/lessons.md).
# Declenche aussi sur modification de ce fichier (paths ci-dessous).
on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          OPENAI_API_KEY: test-key-not-real
        run: python -m pytest -q
