     via currentColor. Trait 1,5 px, sans remplissage. Dessiné pour rester
     lisible à 20 px : corps central, deux ailes déployées en courbe, petite
     queue fourchue. À poser à l'intérieur de l'anneau de sceau (voir le
     composant AlerionSeal). -->
