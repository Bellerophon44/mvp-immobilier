<!-- Sceau aux trois alérions de Lorraine — « D'or à la bande de gueules chargée
     de trois alérions d'argent » (armes du duché ; docs/brand/METZ-LOCAL.md §2).
     Anneau de sceau plein (le même circle r=9 que Seal / AlerionSeal) contenant
     TROIS fois le glyphe d'AlerionSeal — aiglon héraldique ailes déployées, sans
     bec ni pattes, petite queue fourchue — calibré (scale 0.5, espacé sur la
     bande) pour remplir l'anneau, du chef dextre (haut-gauche) à la pointe
     senestre (bas-droite). Encré en or Jaumont (#C9A14A) via currentColor.

     Trait : l'anneau reste à 1,5 px (cohérent avec le set) ; les glyphes internes
     sont à 1,25 px. L'anneau cadre, les glyphes gravent.

     MARK GRAND FORMAT (≥ 96 px) : en-tête de rapport, héro, page « à propos »,
     grand brand-mark. Taille minimale lisible estimée ~96 px : en dessous les
     gaps entre alérions et les queues fourchues passent sous le seuil de rendu —
     l'UI 20 px garde le losange (Seal) et le cachet 64 px garde l'alérion unique
     (AlerionSeal).

     OPTION « bande » (lecture héraldique explicite) : décommenter les deux
     hairlines diagonales ci-dessous. Réservé aux très grands formats (≥ 200 px),
     et idéalement recentré entre les alérions par un graphiste — voir
     Design System/preview/brand-alerion-lorraine.html. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="9"></circle>

  <!-- Option bande (désactivée par défaut) :
  <path d="M9.0 5.46 L18.54 15.0" stroke-width="0.9"></path>
  <path d="M5.46 9.0 L15.0 18.54" stroke-width="0.9"></path>
  -->

  <g stroke-width="1.25">
    <!-- alérion 1 — chef dextre (haut-gauche) -->
    <path d="M8.7 7.6 L8.7 9.8"></path>
    <path d="M8.7 9.8 L8.25 10.2 M8.7 9.8 L9.15 10.2"></path>
    <path d="M6.0 7.8 C 6.8 7.4 7.2 8.4 7.6 8.3 C 8.0 8.2 8.4 8.0 8.7 7.8"></path>
    <path d="M11.4 7.8 C 10.6 7.4 10.2 8.4 9.8 8.3 C 9.4 8.2 9.0 8.0 8.7 7.8"></path>
    <!-- alérion 2 — cœur -->
    <path d="M12.0 10.9 L12.0 13.1"></path>
    <path d="M12.0 13.1 L11.55 13.5 M12.0 13.1 L12.45 13.5"></path>
    <path d="M9.3 11.1 C 10.1 10.7 10.5 11.7 10.9 11.6 C 11.3 11.5 11.7 11.3 12.0 11.1"></path>
    <path d="M14.7 11.1 C 13.9 10.7 13.5 11.7 13.1 11.6 C 12.7 11.5 12.3 11.3 12.0 11.1"></path>
    <!-- alérion 3 — pointe senestre (bas-droite) -->
    <path d="M15.3 14.2 L15.3 16.4"></path>
    <path d="M15.3 16.4 L14.85 16.8 M15.3 16.4 L15.75 16.8"></path>
    <path d="M12.6 14.4 C 13.4 14.0 13.8 15.0 14.2 14.9 C 14.6 14.8 15.0 14.6 15.3 14.4"></path>
    <path d="M18.0 14.4 C 17.2 14.0 16.8 15.0 16.4 14.9 C 16.0 14.8 15.6 14.6 15.3 14.4"></path>
  </g>
</svg>
