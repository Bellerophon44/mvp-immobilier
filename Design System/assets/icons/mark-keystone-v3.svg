<!-- Cohérence — mark-keystone v3 : CLAVEAUX MODULAIRES.
     Concept : l'arc dessiné comme un APPAREIL de pierres distinctes (claveaux séparés
     par leurs joints) — l'assemblage qui tient = la cohérence rendue littérale.
     Cinq claveaux : deux d'imposte, deux d'épaule, une clef centrale pleine (Jaumont).
     Les joints radiaux (rayonnant vers le centre du cercle) sont architecturalement
     justes. Plus riche, plus "taillé", moins lisse-corporate que l'arc continu. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
  <!-- intrados (sous-face de l'arc) -->
  <path d="M4 14 A 8 8 0 0 1 20 14" />
  <!-- extrados (dessus de l'arc) -->
  <path d="M4 14 L4 11.5 A 10.5 10.5 0 0 1 20 11.5 L20 14" />
  <!-- joints radiaux entre claveaux (rayonnent vers le bas, centre du cercle) -->
  <path d="M7.55 7.1 L6.7 5.1" />
  <path d="M16.45 7.1 L17.3 5.1" />
  <!-- clef centrale pleine (Jaumont), délimitée par ses deux joints -->
  <path d="M10.5 6 L9.9 4 M13.5 6 L14.1 4" />
  <path d="M10.5 6.05 L13.5 6.05 L14.1 4 L9.9 4 Z" fill="#C9A14A" stroke="#C9A14A" />
</svg>
