<!-- Cohérence — mark-keystone v4 : LA CLEF-MONOGRAMME (clef + « C »).
     Concept : fusion mark + monogramme. Le claveau trapézoïdal est creusé d'une
     réserve en forme de « C » (Cohérence) ouverte vers la droite. La pierre qui tient
     ET l'initiale de la marque, dans un seul signe. Le « C » est un arc épais
     (terminaisons franches, au burin) logé dans le corps du claveau Jaumont.
     Le contour du trapèze reste le porteur de sens à 16 px ; le C se révèle ≥20 px. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- corps du claveau (trapèze large en haut) -->
  <path d="M4.5 5.5 L19.5 5.5 L16.5 18.5 L7.5 18.5 Z" />
  <!-- le « C » gravé dans la pierre : arc ouvert à droite, coupes franches -->
  <path d="M14.2 9.4 A 4 4 0 1 0 14.2 14.6" stroke-linecap="butt" />
</svg>
