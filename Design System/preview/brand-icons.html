<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Iconographie</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px 8px; border: 1px solid var(--stone-line); background: var(--paper); border-radius: 4px; }
  .ic svg { width: 24px; height: 24px; color: var(--ink); }
  .ic .n { font-family: var(--font-mono); font-size: 10px; color: var(--stone); letter-spacing: 0.04em; }
  .lead { font-family: var(--font-sans); font-size: 13px; color: var(--ink-3); margin-bottom: 14px; line-height: 1.45; }
  .lead b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="lead">Un set restreint de <b>sept marques</b> au tracé 1,5&nbsp;px, alignées avec le losange du wordmark. Aucun emoji, aucun glyphe unicode.</div>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L21 12 L12 21 L3 12 Z"/></svg><div class="n">diamond</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 H19"/><path d="M13 6 L19 12 L13 18"/></svg><div class="n">arrow</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14 a4 4 0 0 1 0 -5.66 L13.5 4.84 a4 4 0 0 1 5.66 5.66 L17.5 12.18"/><path d="M14 10 a4 4 0 0 1 0 5.66 L10.5 19.16 a4 4 0 0 1 -5.66 -5.66 L6.5 11.82"/></svg><div class="n">link</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 s-7 -7.5 -7 -12 a7 7 0 0 1 14 0 c0 4.5 -7 12 -7 12 z"/><circle cx="12" cy="9" r="2.5"/></svg><div class="n">map-pin</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 V20"/><path d="M7 20 H17"/><path d="M5 10 L8 4 L11 10"/><path d="M13 10 L16 4 L19 10"/><path d="M5 10 a3 3 0 0 0 6 0"/><path d="M13 10 a3 3 0 0 0 6 0"/></svg><div class="n">scales</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8.5 12 L11 14.5 L16 9.5"/></svg><div class="n">check</div></div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M14 9 V5 a1 1 0 0 0 -1 -1 H5 a1 1 0 0 0 -1 1 V13 a1 1 0 0 0 1 1 H9"/></svg><div class="n">copy</div></div>
  </div>
</div>
</body></html>
