<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px 40px; }
  .mark-row { display: flex; align-items: center; gap: 18px; }
  .mark { width: 56px; height: 56px; }
  .word {
    font-family: var(--font-serif);
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .tagline {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--ink-3);
    font-size: 16px;
    margin-top: 14px;
    margin-left: 74px;
  }
</style>
</head><body>
<div class="card">
  <div class="mark-row">
    <svg class="mark" viewBox="0 0 64 64"><path d="M32 6 L58 32 L32 58 L6 32 Z" fill="#B5462F"/><path d="M32 20 L44 32 L32 44 L20 32 Z" fill="#F5F1EA"/></svg>
    <div class="word">Cohérence</div>
  </div>
  <div class="tagline">« Ce prix et cette annonce sont-ils cohérents avec le marché local ? »</div>
</div>
</body></html>
