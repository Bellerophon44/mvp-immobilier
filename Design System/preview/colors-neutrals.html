<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Neutres</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 88px; border-radius: 4px; border: 1px solid var(--stone-line); }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--stone); letter-spacing: 0.04em; text-transform: uppercase; margin-top: -2px; }
  .var { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1A1814"></div><div class="name">Encre</div><div class="hex">#1A1814</div><div class="var">--ink</div></div>
    <div class="sw"><div class="chip" style="background:#5A5347"></div><div class="name">Encre 3</div><div class="hex">#5A5347</div><div class="var">--ink-3</div></div>
    <div class="sw"><div class="chip" style="background:#8B8275"></div><div class="name">Pierre</div><div class="hex">#8B8275</div><div class="var">--stone</div></div>
    <div class="sw"><div class="chip" style="background:#D9D2C5"></div><div class="name">Filet</div><div class="hex">#D9D2C5</div><div class="var">--stone-line</div></div>
    <div class="sw"><div class="chip" style="background:#ECE5D5"></div><div class="name">Remplissage</div><div class="hex">#ECE5D5</div><div class="var">--stone-fill</div></div>
    <div class="sw"><div class="chip" style="background:#F5F1EA"></div><div class="name">Parchemin</div><div class="hex">#F5F1EA</div><div class="var">--parchment</div></div>
    <div class="sw"><div class="chip" style="background:#FBF8F2"></div><div class="name">Papier</div><div class="hex">#FBF8F2</div><div class="var">--paper</div></div>
  </div>
</div>
</body></html>
