<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Checklist</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 14px; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 4px; }
  .item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--stone-line); }
  .item:last-of-type { border-bottom: none; padding-bottom: 0; }
  .item svg { width: 18px; height: 18px; color: var(--ochre); flex-shrink: 0; margin-top: 1px; }
  .item .t { font-family: var(--font-sans); font-size: 14px; color: var(--ink); line-height: 1.5; }
  .item .h { font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); line-height: 1.5; margin-top: 2px; }
</style>
</head><body>
<div class="card">
  <div class="eyebrow">À&nbsp;vérifier avant la visite</div>
  <div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      <div><div class="t">Année de construction non mentionnée</div><div class="h">Demander DPE complet et année exacte avant la visite.</div></div>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      <div><div class="t">Charges de copropriété absentes</div><div class="h">Demander les trois derniers PV d'assemblée générale.</div></div>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8.5 12 L11 14.5 L16 9.5"/></svg>
      <div><div class="t">Surface Carrez clairement indiquée</div><div class="h">68,5&nbsp;m² — cohérent avec le plan joint.</div></div>
    </div>
  </div>
</div>
</body></html>
