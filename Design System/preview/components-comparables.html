<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Comparables table</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 12px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); }
  .scope { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); }
  .scope svg { width: 14px; height: 14px; }
  table { width: 100%; border-collapse: collapse; }
  thead td { font-family: var(--font-sans); font-size: 11px; font-weight: 500; color: var(--stone); letter-spacing: 0.04em; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid var(--stone-line); }
  tbody td { padding: 10px 0; border-bottom: 1px solid var(--stone-line); font-family: var(--font-sans); font-size: 14px; color: var(--ink); }
  tbody tr:last-child td { border-bottom: none; }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
  .delta-up { color: var(--brick); }
  .delta-dn { color: var(--moss); }
</style>
</head><body>
<div class="card">
  <div class="head">
    <span class="eyebrow">Comparables retenus · 4</span>
    <span class="scope"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 s-7 -7.5 -7 -12 a7 7 0 0 1 14 0 c0 4.5 -7 12 -7 12 z"/><circle cx="12" cy="9" r="2.5"/></svg> Metz · rayon 1,5&nbsp;km · surface&nbsp;±20&nbsp;%</span>
  </div>
  <table>
    <thead><tr><td>Quartier</td><td>Surface</td><td class="num">€/m²</td><td class="num">Écart</td></tr></thead>
    <tbody>
      <tr><td>Sablon</td><td>71&nbsp;m²</td><td class="num">3&nbsp;380&nbsp;€</td><td class="num delta-dn">−1,2&nbsp;%</td></tr>
      <tr><td>Nouvelle&nbsp;Ville</td><td>66&nbsp;m²</td><td class="num">3&nbsp;510&nbsp;€</td><td class="num delta-up">+2,6&nbsp;%</td></tr>
      <tr><td>Centre</td><td>69&nbsp;m²</td><td class="num">3&nbsp;420&nbsp;€</td><td class="num">médiane</td></tr>
      <tr><td>Outre-Seille</td><td>72&nbsp;m²</td><td class="num">3&nbsp;310&nbsp;€</td><td class="num delta-dn">−3,2&nbsp;%</td></tr>
    </tbody>
  </table>
</div>
</body></html>
