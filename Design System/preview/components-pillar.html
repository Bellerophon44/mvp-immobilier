<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Pillar bar</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 18px; }
  .pillar { background: var(--paper); border: 1px solid var(--stone-line); border-radius: 4px; padding: 16px 18px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--ink); }
  .pts { font-family: var(--font-mono); font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .pts .max { color: var(--stone); }
  .bar { height: 6px; background: var(--stone-fill); border-radius: 999px; overflow: hidden; position: relative; }
  .fill { height: 100%; border-radius: 999px; }
  .legend { font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.5; }
  .legend b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="pillar">
    <div class="head"><span class="name">Pilier prix</span><span class="pts">25&nbsp;<span class="max">/ 40</span></span></div>
    <div class="bar"><div class="fill" style="width:62.5%; background:var(--ochre)"></div></div>
    <div class="legend">Légèrement sur-positionné — <b>+18&nbsp;%</b> vs médiane locale (3&nbsp;420&nbsp;€/m²).</div>
  </div>
  <div class="pillar">
    <div class="head"><span class="name">Pilier sémantique</span><span class="pts">48&nbsp;<span class="max">/ 60</span></span></div>
    <div class="bar"><div class="fill" style="width:80%; background:var(--moss)"></div></div>
    <div class="legend">Annonce claire, risque <b>modéré</b>. Deux points restent à vérifier.</div>
  </div>
</div>
</body></html>
