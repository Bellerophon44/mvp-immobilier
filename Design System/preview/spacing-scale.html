<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .scale { display: flex; gap: 18px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .bar { background: var(--brick); border-radius: 2px; width: 28px; }
  .k { font-family: var(--font-mono); font-size: 10px; color: var(--stone); letter-spacing: 0.04em; text-transform: uppercase; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--ink); }
  .lead { font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); margin-bottom: 16px; }
  .lead b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="lead">Base&nbsp;<b>4&nbsp;px</b>. Échelle : 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 96.</div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="k">s-1</div><div class="v">4</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="k">s-2</div><div class="v">8</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="k">s-3</div><div class="v">12</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="k">s-4</div><div class="v">16</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="k">s-5</div><div class="v">24</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="k">s-6</div><div class="v">32</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="k">s-7</div><div class="v">48</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="k">s-8</div><div class="v">64</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="k">s-9</div><div class="v">96</div></div>
  </div>
</div>
</body></html>
