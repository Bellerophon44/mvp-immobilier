<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Display serif</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 14px; }
  .spec { font-family: var(--font-serif); font-size: 64px; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
  .spec-it { font-family: var(--font-serif); font-style: italic; font-size: 32px; line-height: 1.05; color: var(--ink-2); margin-top: 16px; }
  .meta { display: flex; gap: 28px; margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--stone); letter-spacing: 0.04em; }
  .meta b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="label">Display — Instrument Serif</div>
  <div class="spec">Cohérence</div>
  <div class="spec-it">« 4 comparables retenus dans un rayon&nbsp;»</div>
  <div class="meta">
    <div>famille — <b>instrument&nbsp;serif</b></div>
    <div>poids — <b>400 / 400 italic</b></div>
    <div>usage — <b>wordmark · ouvertures · citations</b></div>
  </div>
</div>
</body></html>
