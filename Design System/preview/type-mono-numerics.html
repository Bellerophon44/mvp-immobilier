<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Mono numerics</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 14px; }
  .big { font-family: var(--font-mono); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.03em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .row { display: flex; gap: 36px; margin-top: 16px; align-items: baseline; }
  .row .v { font-family: var(--font-mono); font-size: 20px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .row .k { font-family: var(--font-sans); font-size: 11px; color: var(--stone); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .col { display: flex; flex-direction: column; }
  .meta { margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--stone); letter-spacing: 0.04em; }
  .meta b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="label">Numerics — Geist Mono · tabular</div>
  <div class="big">73&nbsp;/&nbsp;100</div>
  <div class="row">
    <div class="col"><span class="k">médiane</span><span class="v">3&nbsp;420&nbsp;€/m²</span></div>
    <div class="col"><span class="k">surface</span><span class="v">68,5&nbsp;m²</span></div>
    <div class="col"><span class="k">écart</span><span class="v">+18&nbsp;%</span></div>
    <div class="col"><span class="k">comparables</span><span class="v">4</span></div>
  </div>
  <div class="meta">famille — <b>geist mono</b> · <b>tabular-nums</b> activé partout sur les chiffres</div>
</div>
</body></html>
