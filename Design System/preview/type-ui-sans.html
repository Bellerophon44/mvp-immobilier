<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>UI sans</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 14px; }
  .spec { font-family: var(--font-sans); font-size: 32px; line-height: 1.05; color: var(--ink); letter-spacing: -0.01em; }
  .row { display: flex; gap: 32px; margin-top: 14px; align-items: baseline; }
  .row span { font-family: var(--font-sans); }
  .w4 { font-weight: 400; font-size: 18px; color: var(--ink-2); }
  .w5 { font-weight: 500; font-size: 18px; color: var(--ink); }
  .w6 { font-weight: 600; font-size: 18px; color: var(--ink); }
  .w7 { font-weight: 700; font-size: 18px; color: var(--ink); }
  .meta { display: flex; gap: 28px; margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--stone); letter-spacing: 0.04em; }
  .meta b { color: var(--ink); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="label">UI — Geist</div>
  <div class="spec">Analyser l'annonce</div>
  <div class="row">
    <span class="w4">Regular · 400</span>
    <span class="w5">Medium · 500</span>
    <span class="w6">Semibold · 600</span>
    <span class="w7">Bold · 700</span>
  </div>
  <div class="meta">
    <div>famille — <b>geist</b></div>
    <div>usage — <b>tous les libellés UI, formulaires, boutons</b></div>
  </div>
</div>
</body></html>
