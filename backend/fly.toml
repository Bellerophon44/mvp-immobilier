app = "backend-frosty-sound-441-docker"
primary_region = "cdg"

[build]

[env]
  DATABASE_PATH = "/data/comparables.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "comparables_data"
  destination = "/data"

[[vm]]
  cpus = 1
  memory = "1gb"
